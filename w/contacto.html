<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Contacto</title>

    <style>

    

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #ddd4b5;
            color: rgb(206, 19, 19);

            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor principal */
        .contenedor {
   
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 10px;

        }

        /* Bloque */
        .bloque {
            background-color: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 20px;

            width: 700px; 
        }

        /* Títulos */
        .bloque h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .bloque h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* Texto */
        .bloque p {
            margin: 5px 0;
            line-height: 1.5;
        }

        /* Links como botones */
a {
    display: inline-block;
    background-color: #ce1313;
    color: white;
    padding: 10px 20px;
    margin: 10px 5px 0 0;
    text-decoration: none;
    border-radius: 8px;
    font-size: 18px;
    transition: 0.3s;
}

a:hover {
    background-color: #a10f0f;
}

        .foto {
    width: 600px;
    height: auto;
    display: block;
    margin: 10px auto;
}

</head>
